<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HaMa Tech</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Meta description chuẩn cho SEO -->
  <meta name="description" content="Smart Solutions • Future Technology">

  <!-- ========================================== -->
  <!-- Open Graph / Facebook / Zalo / Telegram    -->
  <!-- ========================================== -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://hama.io.vn/">
  <meta property="og:title" content="HaMa Tech">
  <meta property="og:description" content="Smart Solutions • Future Technology">
  <!-- Đường dẫn ảnh tuyệt đối (Bắt buộc) -->
  <meta property="og:image" content="https://hama.io.vn/logo.png">
  <meta property="og:image:secure_url" content="https://hama.io.vn/logo.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:alt" content="HaMa Tech Logo">

  <!-- ========================================== -->
  <!-- Twitter / X / Discord                      -->
  <!-- ========================================== -->
  <!-- Dùng "summary" nếu logo hình vuông, dùng "summary_large_image" nếu logo hình chữ nhật -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://hama.io.vn/">
  <meta name="twitter:title" content="HaMa Tech">
  <meta name="twitter:description" content="Smart Solutions • Future Technology">
  <meta name="twitter:image" content="https://hama.io.vn/logo.png">

  <!-- Màu chủ đạo khi hiển thị trên di động hoặc Discord -->
  <meta name="theme-color" content="#1e120d">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1e120d;
      font-family: Arial, sans-serif;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      position: fixed;
      inset: 0;
    }
  </style>
</head>

<body>

  <!-- Website -->
  <iframe
    src="https://script.google.com/macros/s/AKfycbx09vDn5QyqZb98DXn5A0PLrFyQpSguEuNkwHrUO1W8kIXTfW89RHKTrLt0eBcQTyIe/exec"
    title="HaMa Tech Application">
  </iframe>

</body>
</html>
